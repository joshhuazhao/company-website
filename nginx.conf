server {
    listen 80;
    server_name leanjust.com; # REPLACE_WITH_YOUR_DOMAIN

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name leanjust.com; # REPLACE_WITH_YOUR_DOMAIN

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/leanjust.com/fullchain.pem; # REPLACE_WITH_YOUR_DOMAIN
    ssl_certificate_key /etc/letsencrypt/live/leanjust.com/privkey.pem; # REPLACE_WITH_YOUR_DOMAIN
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
